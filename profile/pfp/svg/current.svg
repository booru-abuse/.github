      <!-- dot -->
      <circle cx="4" cy="14" r="1" />
      <!-- j -->
      <path d="M7 8h3v6a1 1 0 01-1 1h-3v-2h2v-3h-1z" />
      <!-- s -->
      <path d="M15 8v2h-2v1h1a1 1 0 011 1v2a1 1 0 01-1 1h-3v-2h2v-1h-1a1 1 0 01-1-1v-2a1 1 0 011-1z"/>
    </g>
